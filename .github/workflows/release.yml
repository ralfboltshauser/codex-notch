name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release configuration
        env:
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -eu
          : "${APPLE_APP_PASSWORD:?Missing APPLE_APP_PASSWORD secret}"
          : "${APPLE_ID:?Missing APPLE_ID secret}"
          : "${APPLE_TEAM_ID:?Missing APPLE_TEAM_ID secret}"
          : "${MACOS_CERTIFICATE_P12:?Missing MACOS_CERTIFICATE_P12 secret}"
          : "${MACOS_CERTIFICATE_PASSWORD:?Missing MACOS_CERTIFICATE_PASSWORD secret}"
          : "${SPARKLE_PRIVATE_KEY:?Missing SPARKLE_PRIVATE_KEY secret}"
          VERSION=${GITHUB_REF_NAME#v}
          printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$' || {
            echo "Release tags must use vMAJOR.MINOR.PATCH" >&2
            exit 1
          }
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main || {
            echo "Release tags must point to a commit on main" >&2
            exit 1
          }
          PLIST_VERSION=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' apps/macos/AppResources/Info.plist)
          test "$VERSION" = "$PLIST_VERSION" || {
            echo "Tag $GITHUB_REF_NAME does not match Info.plist version $PLIST_VERSION" >&2
            exit 1
          }
          python3 scripts/changelog.py validate

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -eu
          CERTIFICATE=$RUNNER_TEMP/developer-id.p12
          KEYCHAIN=$RUNNER_TEMP/codex-notch.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 24)
          printf '%s' "$MACOS_CERTIFICATE_P12" | base64 -D > "$CERTIFICATE"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERTIFICATE" -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychain -d user -s "$KEYCHAIN" login.keychain-db
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | awk -F '"' '/Developer ID Application/{print $2; exit}')
          test -n "$IDENTITY" || {
            echo "Developer ID Application identity not found" >&2
            exit 1
          }
          echo "CODE_SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Build signed app
        run: ./scripts/build-macos-app.sh

      - name: Verify signing identity and architecture
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -eu
          : "${APPLE_TEAM_ID:?Missing APPLE_TEAM_ID secret}"
          APP='.build/dist/Codex Notch.app'
          codesign --verify --deep --strict --verbose=2 "$APP"
          ACTUAL_TEAM_ID=$(codesign -dv --verbose=4 "$APP" 2>&1 \
            | sed -n 's/^TeamIdentifier=//p')
          test "$ACTUAL_TEAM_ID" = "$APPLE_TEAM_ID" || {
            echo "Signed app team $ACTUAL_TEAM_ID does not match APPLE_TEAM_ID" >&2
            exit 1
          }
          for binary in \
            "$APP/Contents/MacOS/CodexNotch" \
            "$APP/Contents/Helpers/CodexNotchHook"
          do
            ARCHS=$(lipo -archs "$binary")
            test "$ARCHS" = arm64 || {
              echo "$binary must be Apple Silicon-only; found: $ARCHS" >&2
              exit 1
            }
          done

      - name: Notarize and staple
        env:
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -eu
          APP='.build/dist/Codex Notch.app'
          ARCHIVE='.build/dist/CodexNotch.zip'
          rm -f "$ARCHIVE"
          ditto -c -k --keepParent "$APP" "$ARCHIVE"
          xcrun notarytool submit "$ARCHIVE" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$APP"
          xcrun stapler validate "$APP"
          rm -f "$ARCHIVE"
          ditto -c -k --keepParent "$APP" "$ARCHIVE"
          spctl --assess --type execute --verbose=2 "$APP"

      - name: Generate signed Sparkle appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -eu
          VERSION=${GITHUB_REF_NAME#v}
          ASSETS='.build/release-assets'
          mkdir -p "$ASSETS"
          cp '.build/dist/CodexNotch.zip' "$ASSETS/CodexNotch-$VERSION.zip"
          GENERATE_APPCAST=$(find .build/artifacts -type f -name generate_appcast -print -quit)
          SIGN_UPDATE=$(find .build/artifacts -type f -name sign_update -print -quit)
          test -x "$GENERATE_APPCAST" || {
            echo "Sparkle generate_appcast tool not found" >&2
            exit 1
          }
          test -x "$SIGN_UPDATE" || {
            echo "Sparkle sign_update tool not found" >&2
            exit 1
          }
          printf '%s\n' "$SPARKLE_PRIVATE_KEY" | "$GENERATE_APPCAST" \
            --ed-key-file - \
            --download-url-prefix "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/" \
            --link "https://github.com/${GITHUB_REPOSITORY}" \
            --maximum-deltas 0 \
            -o "$ASSETS/appcast.xml" \
            "$ASSETS"
          SIGNATURE=$(python3 - "$ASSETS/appcast.xml" <<'PY'
          import sys
          import xml.etree.ElementTree as ET

          root = ET.parse(sys.argv[1]).getroot()
          signature_key = "{http://www.andymatuschak.org/xml-namespaces/sparkle}edSignature"
          signatures = [
              enclosure.attrib.get(signature_key, "")
              for enclosure in root.findall("./channel/item/enclosure")
          ]
          print(next((signature for signature in signatures if signature), ""))
          PY
          )
          test -n "$SIGNATURE" || {
            echo "Appcast archive signature is missing; SPARKLE_PRIVATE_KEY may not match SUPublicEDKey" >&2
            exit 1
          }
          ARCHIVE="$ASSETS/CodexNotch-$VERSION.zip"
          printf '%s\n' "$SPARKLE_PRIVATE_KEY" | "$SIGN_UPDATE" \
            --ed-key-file - --verify "$ARCHIVE" "$SIGNATURE"
          printf '%s\n' "$SPARKLE_PRIVATE_KEY" | "$SIGN_UPDATE" \
            --ed-key-file - --verify "$ASSETS/appcast.xml"
          (
            cd "$ASSETS"
            shasum -a 256 "CodexNotch-$VERSION.zip" \
              > "CodexNotch-$VERSION.zip.sha256"
          )

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          VERSION=${GITHUB_REF_NAME#v}
          python3 scripts/changelog.py markdown "$VERSION" > .build/release-notes.md
          gh release create "$GITHUB_REF_NAME" \
            ".build/release-assets/CodexNotch-$VERSION.zip" \
            ".build/release-assets/CodexNotch-$VERSION.zip.sha256" \
            ".build/release-assets/appcast.xml" \
            --notes-file .build/release-notes.md \
            --title "Codex Notch $VERSION"
