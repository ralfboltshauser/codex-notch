name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate release configuration
        env:
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -eu
          : "${APPLE_APP_PASSWORD:?Missing APPLE_APP_PASSWORD secret}"
          : "${APPLE_ID:?Missing APPLE_ID secret}"
          : "${APPLE_TEAM_ID:?Missing APPLE_TEAM_ID secret}"
          : "${MACOS_CERTIFICATE_P12:?Missing MACOS_CERTIFICATE_P12 secret}"
          : "${MACOS_CERTIFICATE_PASSWORD:?Missing MACOS_CERTIFICATE_PASSWORD secret}"
          : "${SPARKLE_PRIVATE_KEY:?Missing SPARKLE_PRIVATE_KEY secret}"
          VERSION=${GITHUB_REF_NAME#v}
          printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$' || {
            echo "Release tags must use vMAJOR.MINOR.PATCH" >&2
            exit 1
          }
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main || {
            echo "Release tags must point to a commit on main" >&2
            exit 1
          }
          PLIST_VERSION=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' AppResources/Info.plist)
          test "$VERSION" = "$PLIST_VERSION" || {
            echo "Tag $GITHUB_REF_NAME does not match Info.plist version $PLIST_VERSION" >&2
            exit 1
          }

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -eu
          CERTIFICATE=$RUNNER_TEMP/developer-id.p12
          KEYCHAIN=$RUNNER_TEMP/codex-notch.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 24)
          printf '%s' "$MACOS_CERTIFICATE_P12" | base64 -D > "$CERTIFICATE"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERTIFICATE" -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychain -d user -s "$KEYCHAIN" login.keychain-db
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | awk -F '"' '/Developer ID Application/{print $2; exit}')
          test -n "$IDENTITY" || {
            echo "Developer ID Application identity not found" >&2
            exit 1
          }
          echo "CODE_SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Build signed app
        run: ./build-macos-app.sh

      - name: Notarize and staple
        env:
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -eu
          APP='.build/dist/Codex Notch.app'
          ARCHIVE='.build/dist/CodexNotch.zip'
          rm -f "$ARCHIVE"
          ditto -c -k --keepParent "$APP" "$ARCHIVE"
          xcrun notarytool submit "$ARCHIVE" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$APP"
          rm -f "$ARCHIVE"
          ditto -c -k --keepParent "$APP" "$ARCHIVE"
          spctl --assess --type execute --verbose=2 "$APP"

      - name: Generate signed Sparkle appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -eu
          VERSION=${GITHUB_REF_NAME#v}
          ASSETS='.build/release-assets'
          mkdir -p "$ASSETS"
          cp '.build/dist/CodexNotch.zip' "$ASSETS/CodexNotch-$VERSION.zip"
          GENERATE_APPCAST=$(find .build/artifacts -type f -name generate_appcast -print -quit)
          test -x "$GENERATE_APPCAST" || {
            echo "Sparkle generate_appcast tool not found" >&2
            exit 1
          }
          printf '%s\n' "$SPARKLE_PRIVATE_KEY" | "$GENERATE_APPCAST" \
            --ed-key-file - \
            --download-url-prefix "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/" \
            --link "https://github.com/${GITHUB_REPOSITORY}" \
            --maximum-deltas 0 \
            -o "$ASSETS/appcast.xml" \
            "$ASSETS"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          gh release create "$GITHUB_REF_NAME" \
            ".build/release-assets/CodexNotch-$VERSION.zip" \
            ".build/release-assets/appcast.xml" \
            --generate-notes \
            --title "Codex Notch $VERSION"
