name: CI

on:
  push:
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Test Ubuntu publisher
        run: python3 -m unittest discover -s Tests/LinuxHookTests -v
      - name: Check shell syntax
        run: |
          for script in *.sh; do sh -n "$script"; done
      - name: Compile Python
        run: python3 -m py_compile remote/codex_notch_remote.py remote/codex_notch_live.py
      - name: Validate changelog
        run: python3 changelog.py validate

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - name: Test Swift package
        timeout-minutes: 5
        run: swift test
      - name: Build app bundle
        run: ./build-macos-app.sh
