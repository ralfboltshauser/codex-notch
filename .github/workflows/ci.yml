name: CI

on:
  push:
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check Linux app and repository tooling
        run: make check-linux

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - name: Test Swift package
        timeout-minutes: 5
        run: make test-macos
      - name: Build app bundle
        run: make build-macos
